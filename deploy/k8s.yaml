apiVersion: apps/v1
kind: Deployment
metadata: { name: dnsrecon, labels: { app: dnsrecon } }
spec:
  replicas: 1
  selector: { matchLabels: { app: dnsrecon } }
  template:
    metadata: { labels: { app: dnsrecon } }
    spec:
      containers:
        - name: dnsrecon
          image: ghcr.io/cognis-digital/dnsrecon:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: dnsrecon }
spec:
  selector: { app: dnsrecon }
  ports: [{ port: 80, targetPort: 8000 }]
